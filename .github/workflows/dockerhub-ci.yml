name: CI/CD - Docker Hub Frontend

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_LIONEL }}
          password: ${{ secrets.DOCKERHUB_TOKEN_LIONEL }}

      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile-lionel/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_LIONEL }}/as241s5-aej-16-fe:latest
            ${{ secrets.DOCKERHUB_USERNAME_LIONEL }}/as241s5-aej-16-fe:${{ github.sha }}
